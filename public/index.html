<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Winterswijk Atlas - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; }
        .auth-card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; background: #007bff; color: white; border: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>Winterswijk Login</h2>
    
    <div id="step-email">
        <input type="email" id="email" placeholder="Enter your email" required>
        <button onclick="requestOTP()">Send Login Code</button>
    </div>

    <div id="step-otp" class="hidden">
        <p>Enter the 6-digit code sent to your email.</p>
        <input 
            type="text" 
            id="otp" 
            inputmode="numeric" 
            pattern="[0-9]*" 
            autocomplete="one-time-code" 
            placeholder="000000"
        >
        <button onclick="verifyOTP()">Verify & Login</button>
    </div>
</div>

<script>
    const pb = new PocketBase('http://' + window.location.hostname + ':8090');

    async function requestOTP() {
        const email = document.getElementById('email').value;
        try {
            // This triggers the email from PocketBase
            await pb.collection('users').requestOTP(email);
            document.getElementById('step-email').classList.add('hidden');
            document.getElementById('step-otp').classList.remove('hidden');
            alert("Check your email!");
        } catch (err) {
            alert("Error: " + err.message);
        }
    }

    async function verifyOTP() {
        const email = document.getElementById('email').value;
        const code = document.getElementById('otp').value;
        try {
            const authData = await pb.collection('users').authWithOTP(email, code);
            alert("Logged in as: " + authData.record.email);
            // After login, you can now call your Node.js API on port 3000
            // sending authData.token in the headers!
        } catch (err) {
            alert("Invalid code.");
        }
    }
</script>

</body>
</html>
