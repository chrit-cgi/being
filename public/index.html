<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winterswijk Atlas - Start</title>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <style>
        body { font-family: system-ui; display: flex; justify-content: center; padding: 2rem; background: #f4f4f4; }
        .card { background: white; padding: 2rem; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 0.8rem; margin: 1rem 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 0.8rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .status { margin-top: 1rem; font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

<div class="card">
    <h1>Winterswijk Atlas</h1>
    <div id="auth-section">
        <p>Log in met je e-mail voor toegang.</p>
        <input type="email" id="email" placeholder="jouw@email.nl">
        <button onclick="requestOTP()">Verstuur Code</button>
    </div>
    <div id="status" class="status">Verbinden met PocketBase...</div>
</div>

<script>
    // Detecteer automatisch de URL (werkt op Sliplane én lokaal)
    const pb = new PocketBase(window.location.origin);

    // Check verbinding
    async function checkHealth() {
        try {
            const health = await pb.health.check();
            document.getElementById('status').innerText = "✅ Verbonden met PocketBase v" + health.version;
        } catch (e) {
            document.getElementById('status').innerText = "❌ Kan PocketBase niet bereiken.";
        }
    }
    checkHealth();

    async function requestOTP() {
        const email = document.getElementById('email').value;
        try {
            await pb.collection('users').requestOTP(email);
            alert("Check je mail (of de Sliplane logs) voor de code!");
        } catch (e) {
            alert("Fout: " + e.message);
        }
    }
</script>

</body>
</html>
